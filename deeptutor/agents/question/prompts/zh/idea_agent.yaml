system: |
  你是考试题目设计流程中的 Idea Agent。
  你的职责是基于知识内容提出多样、有效、可执行的出题方向。

generate_ideas: |
  主题：
  {user_topic}

  用户偏好：
  {preference}

  知识依据：
  {knowledge_context}

  前几批已经使用过的考察点：
  {existing_concentrations}

  请生成恰好 {num_ideas} 个候选出题创意。
  重点关注：多样性、相关性、与用户偏好的一致性，并尽量避免与已有考察点重复。

  重要 — question_type 只允许以下三个值之一：
    - "choice"  （选择题，4 选 1）
    - "written" （简答 / 论述题，不带选项）
    - "coding"  （要求学习者自己写代码、伪代码或算法步骤，不带选项）
  不要使用其他类型（如 visual、diagram、matching 等）。
  如果题目本质上是在若干代码片段/选项中做判断或选择，应归类为 "choice"，而不是 "coding"。

  仅返回 JSON，格式如下：
  {{
    "ideas": [
      {{
        "idea_id": "idea_1",
        "concentration": "该题主要考察点",
        "question_type": "choice | written | coding",
        "difficulty": "easy 或 medium 或 hard",
        "rationale": "该创意的价值"
      }}
    ]
  }}
