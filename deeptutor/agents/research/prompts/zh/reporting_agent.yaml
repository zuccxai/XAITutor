# ReportingAgent 提示词配置 - 深度研究报告生成
# 设计目标：生成元素丰富、逻辑连贯、内容翔实的学术级深度研究报告

# 引用指令模板
citation:
  enabled_instruction: |
    **引用要求（重要）**：
       - 格式：使用 `[N]` 格式，其中 N 是下表中的参考编号
       - 只使用引用参考表中的参考编号 - 不要编造编号！
       - 将引用放在使用该来源信息的句子或论述末尾
       - 不要添加参考文献部分 - 它将自动生成

    **引用参考表**（使用这些确切编号）：
    {citation_table}

    **示例**：
       - "根据最新研究 [5]，该方法实现了..."
       - "这种方法已在多项研究中得到验证 [3][7]。"

  disabled_instruction: |
    **引用要求**：
       - 不要在文本中添加任何行内引用，如 [1]、[[1]] 或 [N]
       - 不要在末尾添加参考文献部分 - 参考文献将单独处理
       - 专注于内容综合，不使用引用标记

system:
  role: |
    你是一位顶级学术写作与内容整合专家，擅长将复杂的研究成果转化为结构清晰、论述深刻的专业报告。你的报告应具备以下特质：

    **核心写作理念**：
    1. **深度优于广度**：宁可深入剖析少数关键点，也不泛泛而谈
    2. **论证优于陈述**：每个观点都应有充分的证据、推理或实例支撑
    3. **结构化呈现**：善用公式、表格、流程图、代码等多种元素增强表达力
    4. **学术严谨性**：准确引用来源，区分事实与推断，承认局限性

    **重要格式要求**：
    - 所有输出必须严格遵循 JSON 格式
    - 只输出有效的 JSON 对象，不要包含任何额外的文本、解释或代码块标记
    - JSON 必须可以被直接解析，不能包含注释或格式错误
    - 如果输出中包含 Markdown 内容，请将其作为 JSON 字符串值，并正确转义特殊字符

mode_contracts:
  study_notes_outline: |
    - 本模式必须产出“学习笔记/复习提纲”，不是正式报告。
    - 大纲应优先使用“关键概念、核心机制、例子、易错点、总结”这类笔记式结构。
    - 标题要短、直接、利于记忆。
    - 不要按“背景-方法-分析-结论”的报告结构来组织。
  study_notes_introduction: |
    - 开头要短，主要用于定向。
    - 明确说明读完这份笔记后应该掌握什么。
    - 避免长篇背景铺垫和正式报告式引入。
  study_notes_section: |
    - 要写成高质量学习笔记，而不是长篇文章。
    - 优先使用要点、短段解释、迷你例子、易错点列表、takeaway 块。
    - 不要让章节读起来像正式论文或综述报告。
    - 每个核心概念都要有定义框：`> **定义 — <术语>**: <简洁定义>`
    - 每节末尾加一个自测微问题：`> 💡 **自测**: 你能不看笔记解释<概念>吗？`
    - 在合适的地方加记忆锚点：`> 🧠 **记忆锚点**: <助记符、类比或视觉线索>`
  study_notes_conclusion: |
    - 结尾应是回顾清单或关键结论块。
    - 包含重点结论，可附常见误区。
    - 加一个**自测清单**：列出学习者应该能够凭记忆解释的核心概念。格式：`✅ 1. 你能解释...吗？`
    - 不要写正式“结论/局限/未来工作”。
  study_notes_single_pass: |
    - 最终整体必须像给学习者准备的复习笔记。
    - 要紧凑、可扫读、便于记忆和回顾。
    - 全文包含定义框、自测微问题和记忆锚点。
    - 结尾附自测清单以检验记忆。
    - 成品应明显服务于理解、记忆与快速复习。

  report_outline: |
    - 本模式必须产出正式综述/分析报告。
    - 应采用标准分析结构：背景、主题展开、分析综合、结论。
    - 不要写成笔记单、对比矩阵或学习路线图。
  report_introduction: |
    - 写正式引言，交代动机、范围与报告结构。
    - 语气应保持分析型、报告型。
  report_section: |
    - 用持续性的分析 prose 来写，保持段落过渡和证据综合。
    - 章节应像报告章节，而不是碎片化笔记或阶段说明。
  report_conclusion: |
    - 结尾必须是正式的综合性结论。
    - 要总结发现、意义、局限与最终判断。
  report_single_pass: |
    - 最终整体必须像一篇正式报告，保持稳定的分析型 prose 和报告结构。
    - 成品应明显服务于分析、综合与基于证据的解释。

  comparison_outline: |
    - 本模式必须产出“对比型文档”，不是普通报告。
    - 大纲要围绕“比较维度/评价标准”来组织，而不是逐个主题平铺。
    - 必须为 trade-off、优缺点、适用场景预留明确位置。
    - 结构上应自然包含比较表/矩阵。
  comparison_introduction: |
    - 开头必须明确：比较对象是什么、为什么要比较、比较标准是什么。
  comparison_section: |
    - 每个主章节都必须把对象放在同一维度下并列比较。
    - 强调维度分析、显式对照、表格和场景判断。
    - 不要漂移成各讲各的主题综述。
    - 每个比较维度为各选项分配 1-5 分量化评分，以迷你表格呈现。
  comparison_conclusion: |
    - 结尾必须给出“按场景/约束/优先级”的推荐判断。
    - 选择建议要明确，不要模糊。
    - 包含**评分汇总表**，汇总所有维度评分：`| 维度 | 选项A | 选项B | ... |`（1-5 分）
    - 汇总表下方给出综合加权印象和按场景推荐。
  comparison_single_pass: |
    - 最终整体必须是维度优先、trade-off 明显、推荐导向的对比文档。
    - 读感上必须一眼就是 comparison，不是 report。
    - 包含每维度每选项的 1-5 量化评分，结论部分有评分汇总表。
    - 成品应帮助读者在明确场景或约束下做出选择。

  learning_path_outline: |
    - 本模式必须产出“分阶段学习路线图”。
    - 大纲应按“先修 → 阶段1 → 阶段2 → 阶段3 → 练习 → 里程碑 → 下一步”来组织。
    - 不要把通用主题综述章节当作主骨架。
  learning_path_introduction: |
    - 明确目标学习者、先修假设和整体进阶路径。
    - 从一开始就让读者知道这是 roadmap。
  learning_path_section: |
    - 必须写成学习路线，而不是报告。
    - 把顺序、先修、练习、checkpoint、里程碑、下一步学什么写清楚。
    - 每个章节都应帮助学习者行动，而不只是理解。
    - 每个阶段开头标注：`> ⏱️ **预计时间**: X 小时` 和 `> 📊 **难度**: 基础 / 中级 / 高级`
    - 包含**推荐资源**块：`> 📚 **推荐资源**: [书籍、课程、工具或链接]`
  learning_path_conclusion: |
    - 结尾应包含里程碑检查、下一步建议，以及完成后如何继续推进。
    - 包含 Mermaid 路线图：
      ```mermaid
      graph LR
        A["阶段 1: ..."] --> B["阶段 2: ..."]
        B --> C["阶段 3: ..."]
      ```
    - 图下方汇总总预计时间和最终能力检查清单。
  learning_path_single_pass: |
    - 最终整体必须像一份阶段化学习计划，突出顺序、checkpoint、练习与进阶逻辑。
    - 每个阶段必须标注预计时间、难度标签和推荐资源。
    - 结尾包含 Mermaid 路线图和总时间估算。
    - 成品应帮助学习者明确先做什么、接着做什么、如何判断自己是否过关。

process:
  deduplicate: |
    分析以下话题列表，识别重复或高度相似的话题。

    **重要：你必须只输出一个有效的 JSON 对象，不要包含任何其他文本、解释或代码块标记。**

    话题列表：
    {topics}

    总话题数：{total_topics}

    **分析步骤：**
    1. 理解每个话题的核心内容和研究视角
    2. 识别语义重复或高度相似的话题（注意：视角不同的同一概念不算重复）
    3. 选择最具代表性、内容最丰富的话题保留

    **输出格式要求（严格遵循）：**
    - 只输出 JSON 对象，不要使用 ```json 代码块包裹
    - 不要添加任何解释性文字
    - 确保 JSON 格式完全有效，可以直接被解析

    输出示例（仅作为格式参考，不要复制内容）：
    {{
      "duplicates": [{{"indices": [0, 3], "reason": "语义重复：两者都讨论XX的基本原理"}}],
      "keep_indices": [0, 1, 2, 4],
      "summary": "保留了4个互补性话题，覆盖理论基础、技术实现、应用场景和前沿发展"
    }}

    **现在请直接输出 JSON 对象，不要包含任何其他内容。**

  generate_outline: |
    为以下研究生成结构化的三级标题体系大纲。

    **重要：你必须只输出一个有效的 JSON 对象，不要包含任何其他文本、解释或代码块标记。**

    研究主题：{topic}

    研究话题（包含subtopic、overview和tool_summaries）：
    {topics_json}

    总话题数：{total_topics}

    **大纲设计原则**：

    1. **三级标题体系**：
       - 一级标题（#）：报告总标题
       - 二级标题（##）：主要章节（引言、核心章节1-N、结论）
       - 三级标题（###）：章节内的子主题
       - 四级标题（####）：细分内容（可选，用于复杂章节）

    2. **逻辑结构设计**：
       - 识别话题间的逻辑关系：层次、依赖、并列、递进、对比
       - 按认知规律排序：概念→原理→方法→应用→评估→展望
       - 确保章节间有明确的过渡逻辑

    3. **章节设计指南**：
       - 每个主章节应有明确的研究问题或目标
       - 子章节应覆盖该主题的核心维度
       - instruction 应指明需要涵盖的关键要素和呈现方式

    **输出格式要求（严格遵循）：**
    - 只输出 JSON 对象，不要使用 ```json 代码块包裹
    - 不要添加任何解释性文字

    输出示例（仅作为格式参考，不要复制内容）：
    {{
      "title": "# 报告总标题：精确表达研究主题",
      "introduction": "## 引言",
      "introduction_instruction": "阐述研究背景、问题动机、研究目标和报告结构",
      "sections": [
        {{
          "title": "## 1. 第一主章节标题",
          "instruction": "本章重点阐述...需要包含原理推导和关键公式",
          "block_id": "block_1",
          "subsections": [
            {{
              "title": "### 1.1 子章节标题",
              "instruction": "详细说明...建议使用表格对比"
            }},
            {{
              "title": "### 1.2 子章节标题",
              "instruction": "分析...建议使用流程图展示"
            }}
          ]
        }}
      ],
      "conclusion": "## 结论与展望",
      "conclusion_instruction": "总结核心发现、研究贡献、局限性和未来方向"
    }}

    **现在请直接输出 JSON 对象，不要包含任何其他内容。**

  write_introduction: |
    撰写研究报告的引言部分。

    **重要：你必须只输出一个有效的 JSON 对象，不要包含任何其他文本、解释或代码块标记。**

    研究主题：{topic}
    引言指导：{introduction_instruction}
    研究话题概览：{topics_summary}
    总话题数：{total_topics}

    **引言写作框架**（400-600字）：

    1. **开篇立意**（第1段）：
       - 从宏观背景或重要趋势切入
       - 引出研究领域的核心挑战或机遇
       - 点明研究的必要性和紧迫性

    2. **问题聚焦**（第2段）：
       - 明确本研究要解决的具体问题
       - 阐述现有方法或认知的不足
       - 引出研究的核心目标

    3. **研究范围**（第3段）：
       - 概述研究涵盖的主要维度
       - 说明各部分之间的逻辑关系
       - 预告核心发现或贡献（可选）

    4. **结构导引**（第4段）：
       - 简要介绍报告各章节的组织安排
       - 帮助读者建立阅读预期

    **写作要求**：
    - 使用学术化但不晦涩的语言
    - 每段有明确的主题句
    - 段落间有自然过渡
    - 不要使用章节标题，直接写正文内容

    **输出格式要求（严格遵循）：**
    - 只输出 JSON 对象，不要使用 ```json 代码块包裹
    - JSON 字符串中的特殊字符（如引号、换行符）必须正确转义

    输出示例：
    {{
        "introduction": "完整的引言内容（Markdown格式，不含标题，400-600字）"
    }}

    **现在请直接输出 JSON 对象，不要包含任何其他内容。**

  write_section_body: |
    基于研究数据撰写深度章节内容。

    **重要：你必须只输出一个有效的 JSON 对象，不要包含任何其他文本、解释或代码块标记。**

    研究主题: {topic}
    章节标题: {section_title}
    写作指导: {section_instruction}
    数据源: {block_data}

    **深度写作框架**：

    ## 第一步：素材深度解析

    1. **信息分级处理**：
       - **核心层**：关键定义、核心公式、主要结论 → 必须完整呈现
       - **支撑层**：推导过程、实验数据、案例分析 → 选择性深入
       - **背景层**：历史沿革、相关工作 → 简要提及

    2. **信息可信度评估**：
       - 优先采信：peer-reviewed论文 > 权威教材 > 技术文档 > 网络资源
       - 冲突处理：标注不同观点，或选择最新/最权威来源

    ## 第二步：结构化组织

    **三级标题体系**（必须遵循）：
    - 本章节使用 `##` 作为主标题
    - 使用 `###` 组织子主题（2-4个为宜）
    - 复杂子主题可使用 `####` 进一步细分

    **逻辑架构模式**（选择最适合的一种）：
    - **演绎式**：原理→推论→应用→验证
    - **归纳式**：现象→分析→规律→理论
    - **对比式**：方法A vs 方法B → 优劣分析 → 适用场景
    - **问题导向式**：问题→现有方案→局限性→改进思路

    ## 第三步：多模态元素运用

    **必须根据内容特点选择性使用以下元素**：

    1. **数学公式**（LaTeX格式）：
       - 行内公式：`$E = mc^2$`
       - 独立公式块：
         ```
         $$
         \mathcal{L} = \sum_{i=1}^{n} \ell(y_i, f(x_i)) + \lambda \Omega(f)
         $$
         ```
       - 适用：定义、定理、推导、优化目标等

    2. **表格**（Markdown格式）：
       - 适用：多维度对比、参数配置、实验结果、分类汇总
       - 格式示例：
         ```
         | 方法 | 准确率 | 效率 | 适用场景 |
         |------|--------|------|----------|
         | A    | 95%    | 快   | 实时系统 |
         | B    | 98%    | 慢   | 离线分析 |
         ```

    3. **流程图**（Mermaid格式）：
       - 适用：算法流程、系统架构、决策逻辑、数据流向
       - 格式示例：
         ```mermaid
         graph TD
             A[输入] --> B{{处理}}
             B --> C[输出]
         ```

    4. **代码块**：
       - 适用：算法实现、配置示例、API调用
       - 必须标注语言类型（python/javascript/sql等）

    5. **列表与层级**：
       - 有序列表：步骤、排名、优先级
       - 无序列表：特点、要素、选项
       - 嵌套列表：层级关系、分类体系

    ## 第四步：学术写作规范
    {citation_instruction}

    1. **深度转述**：
       - 避免直接复制，用学术语言重组表达
       - 示例转换：
         - 原：「X方法效果好」
         - 改：「实验结果表明，X方法在Y指标上取得了显著提升，相较基线方法提高了Z%」

    2. **论证完整性**：
       - 每个核心观点都应有：论点 → 论据 → 论证 → 小结
       - 适当使用过渡句连接段落

    3. **专业术语处理**：
       - 首次出现时给出定义或解释
       - 可使用「术语（英文原文）」格式

    **输出格式要求（严格遵循）：**
    - 只输出 JSON 对象，不要使用 ```json 代码块包裹
    - JSON 字符串中的换行符应使用 \n 转义
    - 确保 JSON 格式完全有效

    输出示例：
    {{
        "section_content": "## 章节标题\n\n开篇段落...\n\n### 1.1 子章节标题\n\n内容...\n\n### 1.2 子章节标题\n\n内容...{citation_output_hint}"
    }}

    **字数要求**：每个章节至少800字，内容翔实、论述充分

    **现在请直接输出 JSON 对象，不要包含任何其他内容。**

  write_conclusion: |
    撰写研究报告的结论部分。

    **重要：你必须只输出一个有效的 JSON 对象，不要包含任何其他文本、解释或代码块标记。**

    研究主题：{topic}
    结论指导：{conclusion_instruction}
    关键发现：{topics_findings}
    总话题数：{total_topics}

    **结论写作框架**（500-700字）：

    1. **研究回顾与核心发现**（第1-2段）：
       - 简要回顾研究问题和方法
       - 系统总结各章节的核心发现
       - 归纳形成整体性结论

    2. **研究贡献与价值**（第3段）：
       - **理论贡献**：对领域认知的推进
       - **方法贡献**：新方法、新框架、新工具
       - **实践价值**：对实际应用的指导意义

    3. **局限性与反思**（第4段）：
       - 诚实指出研究的局限性
