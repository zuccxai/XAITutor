  generate_outline_learning_path: |
    为以下主题创建一份学习路径路线图大纲。

    **重要：你必须只输出一个有效的 JSON 对象。**

    研究主题：{topic}

    研究话题（包含subtopic、overview和tool_summaries）：
    {topics_json}

    总话题数：{total_topics}

    **学习路径大纲规则**（严格遵循）：

    1. **结构必须是阶段优先且渐进式**。读者应能感受到从入门到精通的清晰进阶。
    2. 以"适用人群"章节开头（学习者画像、前置知识、最终目标）。
    3. 中间章节 = 顺序阶段（阶段1 → 阶段2 → 阶段3 → …）。按先修依赖排序——什么必须在什么之前学。
    4. 每个阶段必须包含：学习目标、核心内容、练习建议、检查站（如何判断准备好进入下一阶段）。
    5. 以"里程碑与下一步"结尾——进度标记和后续建议。
    6. **绝不**组织成平铺的主题报告。进阶感必须显而易见。

    输出 JSON：
    {{
      "title": "# 学习路径：主题标题",
      "introduction": "## 适用人群",
      "introduction_instruction": "定义目标学习者（背景、水平）、前置知识、完成路径后能做什么、预计所需投入。",
      "sections": [
        {{
          "title": "## 阶段 1. 阶段名称",
          "instruction": "涵盖该阶段的基础概念。包含学习目标、核心内容、练习计划和检查站。",
          "block_id": "block_1",
          "subsections": [
            {{ "title": "### 学习目标", "instruction": "完成该阶段后学习者应能做到什么" }},
            {{ "title": "### 核心内容", "instruction": "该阶段的关键概念和材料" }},
            {{ "title": "### 练习与实操", "instruction": "动手活动、练习题或项目" }},
            {{ "title": "### 检查站", "instruction": "如何验证是否准备好进入下一阶段" }}
          ]
        }}
      ],
      "conclusion": "## 里程碑与下一步",
      "conclusion_instruction": "提供覆盖所有阶段的里程碑检查表、自评标准，以及完成路径后的后续指导。"
    }}

    **现在请直接输出 JSON 对象。**

  write_introduction_learning_path: |
    撰写学习路径的"适用人群"章节。

    **重要：你必须只输出一个有效的 JSON 对象。**

    研究主题：{topic}
    学习者指导：{introduction_instruction}
    话题概览：{topics_summary}
    总话题数：{total_topics}

    **规则**：
    - 明确定义：(a) 目标学习者画像，(b) 前置知识，(c) 完成后能做什么，(d) 预计时间/投入。
    - 使用加粗标签的结构化格式。
    - 控制在300字以内。要具体、可操作。

    输出：
    {{
        "introduction": "**目标学习者**：...\n\n**前置知识**：...\n\n**完成后你将能够**：...\n\n**预计投入**：..."
    }}

    **现在请直接输出 JSON 对象。**

  write_section_body_learning_path: |
    撰写一个学习阶段章节。输出必须读起来像结构化的课程阶段——不是报告章节。

    **重要：你必须只输出一个有效的 JSON 对象。**

    研究主题：{topic}
    章节标题：{section_title}
    写作指导：{section_instruction}
    数据源：{block_data}

    **学习路径阶段规则**（强制）：

    1. **阶段元数据**：每个阶段开头标注：
       ```
       > ⏱️ **预计时间**：X 小时
       > 📊 **难度**：基础 / 中级 / 高级
       ```
    2. **学习目标**：以要点列表开头："完成本阶段后你将能够：…"
    3. **为什么是现在**：简要解释先修链——为什么这个阶段在这个位置。
    4. **核心内容**：教授关键概念。适当使用定义框、例子、图表和代码。保持解释清晰、渐进。
    5. **练习计划**：包含具体的练习题、小项目或待解决的问题：
       ```
       > 📝 **练习**：做什么、预期结果、如何检验答案。
       ```
    6. **推荐资源**：建议相关书籍、课程、工具或链接：
       ```
       > 📚 **推荐资源**：[推荐材料列表]
       ```
    7. **检查站**：以自评块结尾：
       ```
       > ✅ **检查站 — 准备好进入阶段 N+1 了吗？**
       > - 你能解释 X 吗？
       > - 你能实现 Y 吗？
       > - 你能判断 Z 什么时候适用吗？
       ```
    8. **绝不**写成报告章节。每个段落都应帮助学习者**行动**，而不只是理解。

    {citation_instruction}

    输出：
    {{
        "section_content": "## 阶段 N. 标题\n\n> ⏱️ **预计时间**：X 小时\n> 📊 **难度**：中级\n\n**学习目标**：\n- ...\n\n**为什么是现在**：...\n\n### 核心内容\n...\n\n> 📝 **练习**：...\n\n> 📚 **推荐资源**：...\n\n> ✅ **检查站 — 准备好进入阶段 N+1 了吗？**\n> - ...{citation_output_hint}"
    }}

    **字数要求**：每个阶段500-800字。

    **现在请直接输出 JSON 对象。**

  write_conclusion_learning_path: |
    为学习路径撰写"里程碑与下一步"章节。

    **重要：你必须只输出一个有效的 JSON 对象。**

    研究主题：{topic}
    里程碑指导：{conclusion_instruction}
    关键发现：{topics_findings}
    总话题数：{total_topics}

    **规则**（强制）：
    - **路线图**：包含 Mermaid 流程图展示阶段进阶：
      ```mermaid
      graph LR
        A["阶段 1: ..."] --> B["阶段 2: ..."]
        B --> C["阶段 3: ..."]
      ```
    - **里程碑检查表**：覆盖所有阶段的表格（含时间估算）：
      ```
      | 阶段 | 里程碑 | 预计时间 | 自检 |
      |------|--------|----------|------|
      | 1    | ...    | X 小时   | 你能…？ |
      ```
    - **总时间估算**：汇总所有阶段时间。
    - **自我评估**：帮助学习者判断整体准备度。
    - **下一步**：完成路径后的具体建议——进阶主题、项目、社区、资源。
    - **绝不**写正式结论（不要"局限性"）。这是面向未来的、行动导向的。

    输出：
    {{
        "conclusion": "**学习路线图**\n\n```mermaid\ngraph LR\n  A[阶段 1] --> B[阶段 2]\n  B --> C[阶段 3]\n```\n\n**里程碑检查表**\n\n| 阶段 | 里程碑 | 预计时间 | 自检 |\n|---|---|---|---|\n| ... | ... | X 小时 | ... |\n\n**总预计时间**：X 小时\n\n**自我评估**：...\n\n**下一步**：..."
    }}

    **现在请直接输出 JSON 对象。**

  write_full_report_learning_path: |
    一次性撰写完整的学习路径文档。

    **重要：你必须只输出一个有效的 JSON 对象。**

    研究主题：{topic}
    大纲 JSON：
    {outline_json}

    主题块数据：
    {blocks_json}

    总话题数：{total_topics}

    引用要求：
    {citation_instruction}

    **关键要求**：输出必须读起来像一份阶段化的学习课程，不是报告。

    **强制元素**：
    - "适用人群"章节（学习者画像、前置知识、最终目标）
    - 顺序阶段（阶段1 → 2 → 3…），每个包含：
      - 阶段元数据：`> ⏱️ **预计时间**：X 小时` 和 `> 📊 **难度**：基础/中级/高级`
      - 目标、为什么现在、核心内容、练习、推荐资源、检查站
    - 练习块：`> 📝 **练习**：...`
    - 推荐资源块：`> 📚 **推荐资源**：...`
    - 检查站块：`> ✅ **检查站**：...`
    - "里程碑与下一步"章节（Mermaid 路线图 + 里程碑表 + 总时间估算 + 后续建议）
    - 全文可见的先修依赖链
    - 绝不写成平铺的主题报告

    输出：
    {{
      "report": "# 学习路径：标题\n\n## 适用人群\n...\n\n## 阶段 1. ...\n\n**学习目标**：\n...\n\n> 📝 **练习**：...\n\n> ✅ **检查站**：...\n\n## 里程碑与下一步\n..."
    }}

    **现在请直接输出 JSON 对象。**
