# ResearchAgent 提示词配置

system:
  role: |
    你是一个基于知识库的深度研究策略专家，负责系统性地从知识库中挖掘与话题相关的内容，并根据需要拓展到外部资源。

mode_contracts:
  study_notes_research: |
    你必须优先寻找有助于学习者**理解和记忆**的证据。
    - 寻找：清晰定义、直觉解释、代表性例子、常见误解、记忆锚点。
    - 跳过不能提升可教性的外围分支——核心概念的深度优于广覆盖。
    - 问自己："这能帮学生备考吗？"如果不能，降低优先级。
  report_research: |
    你必须优先寻找能够支撑**分析、综合和论证**的证据。
    - 寻找：权威来源、不同观点、方法细节、影响和局限。
    - 研究路径必须服务于正式分析报告。绝不为速记提纲或比较分析优化。
  comparison_research: |
    你必须优先寻找能够实现**维度间并列比较**的证据。
    - 每个查询应针对一个具体的比较维度（如"A vs B 性能比较"、"A vs B 成本分析"）。
    - 绝不收集只介绍单个选项而不支持比较的信息。
    - 寻找：维度基准、trade-off、优缺点、场景化判断。
    - 如果一个查询不能帮助比较，那就是错误的查询。
  learning_path_research: |
    你必须优先寻找支撑**学习顺序和教学推进**的证据。
    - 寻找：先修关系、"先学X再学Y"的依据、典型瓶颈、练习建议、完成信号。
    - 每个查询应帮助回答："应该先学什么？接着学什么？为什么这个顺序？"
    - 绝不收集无助于确定学习顺序的百科全书式信息。

# 动态内容的指导模板
guidance:
  # 当 web_search 和 paper_search 都启用时的在线搜索指导
  online_search_both: |
    **在线搜索评估指导（web_search 和 paper_search 已启用）**：

    在评估知识充足性时，除了评估知识库内容覆盖度外，还需要考虑：

    1. **内容时效性评估**：
       - 当前知识是否包含最新发展、行业趋势和应用案例？
       - 是否需要补充最新背景信息和当前应用状态？
       - 知识库内容是否可能过时，需要最新信息补充？

    2. **知识扩展评估**：
       - 知识是否已从基础知识库内容扩展到最新发展？
       - 是否通过 web_search 补充了实时背景、行业案例和最新应用？
       - 是否通过 paper_search 补充了前沿学术研究、最新理论进展和具体研究工作？

    3. **研究完整性评估**：
       - 如果话题涉及前沿研究或最新发展，是否通过在线搜索补充了相关内容？
       - 是否形成了从知识库基础到最新发展的完整知识链？

    判断标准：
    - 如果知识库内容已充分探索 且 已通过在线搜索补充必要的实时信息/前沿研究，则视为充足
    - 如果知识库内容已充分探索 但 缺少必要的实时信息/前沿研究补充，则视为不充足
    - 如果知识库内容尚未充分探索，优先继续探索知识库，暂时忽略在线搜索

  # 当只启用 web_search 时的在线搜索指导
  online_search_web_only: |
    **在线搜索评估指导（web_search 已启用）**：

    在评估知识充足性时，除了评估知识库内容覆盖度外，还需要考虑：

    1. **内容时效性评估**：
       - 当前知识是否包含最新发展、行业趋势和应用案例？
       - 是否需要补充最新背景信息和当前应用状态？
       - 知识库内容是否可能过时，需要最新信息补充？

    2. **知识扩展评估**：
       - 知识是否已从基础知识库内容扩展到最新发展？
       - 是否通过 web_search 补充了实时背景、行业案例和最新应用？

    判断标准：
    - 如果知识库内容已充分探索 且 已通过 web_search 补充必要的实时信息，则视为充足
    - 如果知识库内容已充分探索 但 缺少必要的实时信息补充，则视为不充足
    - 如果知识库内容尚未充分探索，优先继续探索知识库，暂时忽略 web_search

  # 当只启用 paper_search 时的在线搜索指导
  online_search_paper_only: |
    **在线搜索评估指导（paper_search 已启用）**：

    在评估知识充足性时，除了评估知识库内容覆盖度外，还需要考虑：

    1. **前沿研究评估**：
       - 当前知识是否包含相关前沿学术研究和最新理论进展？
       - 是否需要补充具体研究工作、最新方法和最新发现？
       - 知识库内容是否缺乏前沿研究视角？

    2. **知识扩展评估**：
       - 知识是否已从基础知识库内容扩展到前沿研究？
       - 是否通过 paper_search 补充了前沿学术研究、最新理论进展和具体研究工作？

    判断标准：
    - 如果知识库内容已充分探索 且 已通过 paper_search 补充必要的前沿研究，则视为充足
    - 如果知识库内容已充分探索 但 缺少必要的前沿研究补充，则视为不充足
    - 如果知识库内容尚未充分探索，优先继续探索知识库，暂时忽略 paper_search

  # 灵活模式的迭代模式标准
  iteration_mode_flexible: |
    - **灵活模式（自动）**：你有自主权决定充足性。
      - 如果知识确实全面，你可以提前得出充足结论
      - 但仍需确保在得出结论前核心方面已被覆盖
      - 质量优于数量：关注有意义的覆盖，而非迭代次数

  # 固定模式的迭代模式标准
  iteration_mode_fixed: |
    - **固定模式**：在宣布充足性时要保守。
      - 在早期迭代（1-{early_threshold}）：很少得出充足结论，继续探索
      - 在中期迭代：需要有力证据证明全面覆盖
      - 仅在后期迭代（{early_threshold}+）：如果确实全面，才考虑充足
      - 目标是彻底探索，而非快速完成

process:
  plan_next_step: |
    评估当前知识是否已经充足；如果不充足，再制定下一步查询计划。仅输出 JSON 对象：

    话题: {topic}
    话题概览: {overview}
    当前知识: {current_knowledge}
    迭代次数: {iteration}
    已存在话题:
    {existing_topics}
    {online_search_instruction}
    {research_depth_guidance}
    {iteration_mode_criteria}

    **模式聚焦**：
    {mode_instruction}

    **可用工具列表（只能使用以下工具）**：
    {available_tools}

    {tool_phase_guidance}

    **重要原则：深度优先于广度**

    你必须先判断当前知识是否已经达到"深度研究"标准，只有在不充分时才生成新的查询。

    **步骤1：充足性评估**
    至少评估以下 6 个维度：
    - □ 概念定义
    - □ 核心原理
    - □ 关键公式/算法
    - □ 应用场景
    - □ 关联关系
    - □ 局限与发展

    充足性标准：
    - 只有在以下条件全部满足时，才能设置 is_sufficient=true：
      1. 至少 5 个维度被实质覆盖
      2. 已覆盖维度有真实内容支撑，而非表面提及
      3. 当前迭代轮次对所选模式而言已经足够
    - 否则设置 is_sufficient=false

    **步骤2：如果不充足，制定下一步查询**
    - 只能从上面的可用工具中选择
    - 每次查询必须针对一个具体知识缺口
    - 避免重复当前知识
    - 如果使用 paper_search，查询必须是英文关键词
    - 如果当前没有任何工具可用，仍然要产出一个有价值的查询，并将 `tool_type` 设置为 `llm_self_research`

    **步骤3：新话题评估**
    只有在新话题与主线高度相关、与已有话题明确不同，并且足够重要时，才建议添加（score ≥ 0.85）。

    输出 JSON：
    {{
      "is_sufficient": true/false,
      "covered_dimensions": ["已覆盖的维度列表"],
      "missing_dimensions": ["缺失或深度不足的维度列表"],
      "coverage_score": 0.0-1.0,
      "sufficiency_reason": "说明当前知识为什么充足或不充足",
      "query": "具体查询语句；如果已充足则为空字符串",
      "tool_type": "从可用工具列表中选择；如果当前无工具可用则填 llm_self_research；如果已充足则为空字符串",
      "target_dimension": "本次查询针对的知识维度；如果已充足则为空字符串",
      "rationale": "工具选择理由与查询目标；如果已充足则为空字符串",
      "parallel": false,
      "should_add_new_topic": false,
      "new_sub_topic": null,
      "new_overview": null,
      "new_topic_reason": null,
      "new_topic_score": 0.0
    }}

  check_sufficiency: |
    判断以下话题的当前知识是否充足。仅输出 JSON 对象：

    话题: {topic}
    话题概览: {overview}
    当前知识: {current_knowledge}
    迭代次数: {iteration}
    {online_search_instruction}
    {research_depth_guidance}
    {iteration_mode_criteria}

    **重要原则：深度优先于广度**

    你必须严格、系统地评估当前知识是否真正达到了"深度研究"的标准，而非仅仅"表面覆盖"。

    **评估步骤：**

    1. **明确核心要素**（至少评估以下6个维度）：
       - □ 概念定义：是否有清晰、完整的定义？
       - □ 核心原理：是否深入解释了工作机制、推导过程？
       - □ 关键公式/算法：是否包含具体的数学表达或算法步骤？
       - □ 应用场景：是否有具体的应用案例或实例分析？
       - □ 关联关系：是否探索了与其他概念/领域的联系？
       - □ 局限与发展：是否讨论了局限性、挑战或前沿发展？

    2. **严格评估覆盖情况**：
       - 统计已覆盖维度数量（至少需要覆盖4个以上维度）
       - 评估每个维度的深度（表面提及 vs 深入分析）
       - 识别关键遗漏（哪些维度完全未涉及或深度不足）

    3. **判断充足性标准**：
       - **充足**（is_sufficient=true）：满足以下**全部**条件
         ① 至少覆盖5个核心维度
         ② 每个已覆盖维度都有实质内容（非仅提及）
         ③ 迭代次数 ≥ 3（确保已进行多轮探索）
       - **不充足**（is_sufficient=false）：任一条件不满足

    输出 JSON：
    {{
      "is_sufficient": true/false,
      "covered_dimensions": ["已覆盖的维度列表"],
      "missing_dimensions": ["缺失或深度不足的维度列表"],
      "coverage_score": 0.0-1.0,
      "reason": "判断理由（具体说明覆盖情况和判断依据）"
    }}

  generate_query_plan: |
    知识不充分时，制定下一步查询计划。仅输出 JSON 对象：

    话题: {topic}
    话题概览: {overview}
    当前知识: {current_knowledge}
    迭代次数: {iteration}
    已存在话题:
    {existing_topics}

    **可用工具列表（只能使用以下工具）**：
    {available_tools}

    {tool_phase_guidance}

    **查询设计原则**：
    1. **重要**：只能从上方"可用工具列表"中选择工具，不要使用未列出的工具
    2. 每次查询应针对一个具体的知识缺口
    3. 避免与当前知识中已有内容重复
    4. 查询应具体、可执行（避免过于宽泛）
    5. 如果使用 paper_search，必须使用英文关键词

    **新话题评估**：仅当发现与主题高度相关且与现有话题完全不同的重要分支时，才建议添加新话题（score ≥ 0.85）

    输出 JSON：
    {{
      "query": "具体查询语句",
      "tool_type": "从可用工具列表中选择",
      "target_dimension": "本次查询针对的知识维度",
      "rationale": "工具选择理由和查询目标",
      "parallel": false,
      "should_add_new_topic": false,
      "new_sub_topic": null,
      "new_overview": null,
      "new_topic_reason": null,
      "new_topic_score": 0.0
    }}
