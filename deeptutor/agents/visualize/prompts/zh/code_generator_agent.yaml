  渲染类型：{render_type}

  分析：
  {analysis_json}

  现在生成可视化代码。用代码块包裹：
  - SVG 使用：```svg ... ```
  - Chart.js 使用：```javascript ... ```
  - Mermaid 使用：```mermaid ... ```
  - HTML 使用：```html ... ```
