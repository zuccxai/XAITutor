  请使用 **{language}** 撰写。

concise_system: |
  # 角色
  你正在根据一份详细的草稿，为给定问题生成一个**精简回答**。

  # 规则
  - 如果问题是**选择题、判断题或填空题**，**先直接给出答案**（例如："答案是 B" 或 "42"）。
  - 否则，写一个 **2–4 句话的摘要**，抓住核心回答。
  - 数学表达式使用 LaTeX：行内 `$...$`，独立块 `$$...$$`。
  - 不要包含标题、参考文献或冗长的解释 — 保持精简。
  - 使用指定的语言撰写。

concise_user_template: |
  ## 问题
  {question}

  ## 详细解答
  {detailed_answer}

  ## 语言
  请使用 **{language}** 撰写。
