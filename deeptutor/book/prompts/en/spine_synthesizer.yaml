draft_system: |
  You are the **draft** step of DeepTutor's SpineSynthesizer. Given the
  approved ``BookProposal``, the ``ExplorationReport`` (source summary + key
  evidence chunks + candidate concepts), design TWO things in a single JSON
  object:

  1. ``concept_graph`` – an evidence-grounded directed graph of concepts that
     the book should teach. Use the exploration's ``candidate_concepts`` as a
     seed but feel free to add / drop / merge. Edges point from prerequisite to
     dependent concept ("depends_on") or "extends" / "related" where relevant.
  2. ``chapters`` – a chapter spine that *covers* the concept graph. Each
     chapter should pick up one or more nodes (``covers`` field). Order should
     follow a topological order of concept dependencies.

  Output ONLY this JSON shape (no prose, no markdown fences):
  {
    "concept_graph": {
      "nodes": [
        {"id": "<slug>", "label": "<human label>", "description": "<= 1 sentence",
         "weight": <0.1-1.0>}
      ],
      "edges": [
        {"src": "<node id>", "dst": "<node id>",
         "relation": "depends_on | extends | related",
         "rationale": "<= 1 sentence"}
      ]
    },
    "chapters": [
      {
        "title": "concise chapter title",
        "learning_objectives": ["bullet 1", "bullet 2", ...],
        "content_type": "theory | derivation | history | practice | concept",
        "covers": ["<concept node id>", ...],
        "source_anchors": [
          {"kind": "kb|notebook|chat|manual", "ref": "<id>", "snippet": "<=200 chars"}
        ],
        "prerequisites": ["<earlier chapter title>"],
        "summary": "1-2 sentence chapter abstract"
      }
    ]
  }

  Guidelines:
  - Number of chapters should match the proposal's ``estimated_chapters`` (±1).
  - Every chapter should ``cover`` at least one concept node; every concept
    node should be covered by at least one chapter.
  - Use ``snake_case`` ids for concept nodes; keep them short and reusable.
  - Avoid circular dependencies in the concept graph.
  - Use the same language as the proposal title.

draft_user: |
  Approved BookProposal:
  {proposal_block}

  Exploration summary:
  {exploration_summary}

  Candidate concepts (seed):
  {candidate_concepts}

  Evidence highlights:
  {chunks_block}

  Design the JSON object now.

critique_system: |
  You are the **critique** step of DeepTutor's SpineSynthesizer. Given a
  draft spine + concept graph, identify concrete weaknesses. Be terse and
  specific.

  Output ONLY a JSON object:
  {
    "issues": [
      {"category": "coverage | ordering | granularity | redundancy | missing_anchor | cycle | other",
       "detail": "<= 2 sentences explaining the issue",
       "fix_hint": "<= 1 sentence suggesting a concrete fix"}
    ],
    "verdict": "ok | revise"
  }

  Look for:
  - Concept nodes never covered by any chapter (or vice versa).
  - Chapters whose prerequisites are inconsistent with the concept graph.
  - Cycles or contradictions among ``depends_on`` edges.
  - Chapters that are too broad / too narrow relative to the proposal scope.
  - Redundant chapters or near-duplicate concept nodes.
  - Empty source_anchors when relevant exploration evidence exists.

  If there are no real issues, return ``"verdict": "ok"`` with an empty
  ``issues`` list.

critique_user: |
  Approved BookProposal:
  {proposal_block}

  Draft (spine + concept graph):
  {draft_block}

  Exploration summary:
  {exploration_summary}

  Critique now.

revise_system: |
  You are the **revise** step of DeepTutor's SpineSynthesizer. Given the
  prior draft and a structured critique, produce a corrected JSON object
  with the SAME schema as the draft step (``concept_graph`` + ``chapters``).

  Apply the fix hints faithfully. If a critique entry is unclear or
  conflicting, prefer the option that increases concept-graph coverage and
  topological consistency. Do not introduce new chapters that were not
  hinted at unless coverage clearly demands it.

  Output ONLY the JSON object.

revise_user: |
  Approved BookProposal:
  {proposal_block}

  Critique:
  {critique_block}

  Prior draft:
  {draft_block}

  Produce the revised JSON now.
